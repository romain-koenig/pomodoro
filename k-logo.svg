<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Kromatic K logo with triangular segments -->
  
  <!-- Vertical bar (left side) - Cyan to Blue -->
  <polygon points="10,10 25,10 25,90 10,90" fill="#55c4f9"/>
  
  <!-- Upper diagonal segment 1 (top triangle) - Pink -->
  <polygon points="25,10 70,10 25,35" fill="#f20085"/>
  
  <!-- Upper diagonal segment 2 - Purple -->
  <polygon points="70,10 90,10 25,50" fill="#9a115d"/>
  
  <!-- Middle intersection - Red -->
  <polygon points="25,35 25,50 45,50" fill="#e24726"/>
  
  <!-- Lower diagonal segment 1 - Yellow -->
  <polygon points="25,50 90,90 70,90" fill="#f1aa1a"/>
  
  <!-- Lower diagonal segment 2 (bottom triangle) - Green -->
  <polygon points="25,50 70,90 25,65" fill="#56c740"/>
  
  <!-- Bottom vertical segment - Dark Green -->
  <polygon points="25,65 25,90 10,90" fill="#30823e" style="opacity: 0.3"/>
</svg>
