<?xml version="1.0"?>
<svg width="300" height="250" xmlns="http://www.w3.org/2000/svg" xmlns:svg="http://www.w3.org/2000/svg">
 <!-- 
    Kromatic Logo - Pure SVG
    Base unit: width=100, height=125
  -->

 <g class="layer">
  <title>Layer 1</title>
  <rect fill="#55c4f9" height="125" id="svg_1" width="100" x="0" y="0"/>
  <polygon fill="#295ea7" id="svg_2" points="0,0 100,125 0,125"/>
  <rect fill="#f20085" height="125" id="svg_3" width="100" x="0" y="125"/>
  <polygon fill="#9a115d" id="svg_4" points="0,250 100,125 100,250"/>
  <polygon fill="#e24726" id="svg_5" points="100,125 200,125 200,0"/>
  <polygon fill="#f1aa1a" id="svg_6" points="200,0 300,0 200,125"/>
  <polygon fill="#56c740" id="svg_7" points="100,125 200,250 200,125"/>
  <polygon fill="#30823e" id="svg_8" points="200,125 200,250 300,250"/>
 </g>
</svg>
