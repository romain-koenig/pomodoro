<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="mode-pomodoro">
  <header class="header">
    <div class="logo">Pomodoro</div>
    <button class="btn-settings" id="settingsBtn" aria-label="Open settings" title="Settings">⚙️</button>
  </header>

  <main class="container">
    <section class="timer-card">
      <nav class="mode-tabs" role="tablist" aria-label="Timer modes">
        <button class="tab active" data-mode="pomodoro" data-minutes="25" role="tab" aria-selected="true">
          Pomodoro
        </button>
        <button class="tab" data-mode="short" data-minutes="5" role="tab" aria-selected="false">
          Short Break
        </button>
        <button class="tab" data-mode="long" data-minutes="15" role="tab" aria-selected="false">
          Long Break
        </button>
      </nav>

      <div class="timer-display" aria-live="polite" aria-label="Time remaining">
        <span id="minutes">25</span>:<span id="seconds">00</span>
      </div>

      <div class="controls">
        <button class="btn-start" id="startBtn" aria-label="Start timer">START</button>
        <button class="btn-reset" id="resetBtn" aria-label="Reset timer" title="Reset">&#8635;</button>
      </div>
    </section>

    <section class="session-info" aria-label="Session information">
      <span class="session-label">Session</span>
      <span class="session-count" id="sessionCount">1</span>
    </section>

    <section class="tasks-section">
      <h2 class="tasks-title">Tasks</h2>
      <ul class="task-list" id="taskList" aria-label="Task list"></ul>
      <form class="task-form" id="taskForm" aria-label="Add a task">
        <input
          type="text"
          class="task-input"
          id="taskInput"
          placeholder="What are you working on?"
          maxlength="120"
          autocomplete="off"
        />
        <button type="submit" class="btn-add-task">Add Task</button>
      </form>
    </section>
  </main>

  <div class="notification-banner" id="notificationBanner" role="alert" aria-live="assertive" hidden>
    <span id="notificationMessage"></span>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsModal" hidden>
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title">SETTINGS</h2>
        <button class="btn-close-modal" id="closeSettingsBtn" aria-label="Close settings">✕</button>
      </div>

      <div class="modal-body">
        <!-- Timer Section -->
        <section class="settings-section">
          <h3 class="section-title"><span class="section-icon">⏱️</span> TIMER</h3>
          
          <div class="setting-group">
            <label class="setting-label">Time (minutes)</label>
            <div class="time-inputs">
              <div class="time-input-group">
                <label for="pomodoroMinutes" class="time-sublabel">Pomodoro</label>
                <input type="number" id="pomodoroMinutes" class="time-input" min="1" max="60" value="25" />
              </div>
              <div class="time-input-group">
                <label for="shortBreakMinutes" class="time-sublabel">Short Break</label>
                <input type="number" id="shortBreakMinutes" class="time-input" min="1" max="60" value="5" />
              </div>
              <div class="time-input-group">
                <label for="longBreakMinutes" class="time-sublabel">Long Break</label>
                <input type="number" id="longBreakMinutes" class="time-input" min="1" max="60" value="15" />
              </div>
            </div>
          </div>

          <div class="setting-row">
            <label class="setting-label">Auto Start Breaks</label>
            <label class="toggle-switch">
              <input type="checkbox" id="autoStartBreaks" />
              <span class="toggle-slider"></span>
            </label>
          </div>

          <div class="setting-row">
            <label class="setting-label">Auto Start Pomodoros</label>
            <label class="toggle-switch">
              <input type="checkbox" id="autoStartPomodoros" />
              <span class="toggle-slider"></span>
            </label>
          </div>

          <div class="setting-row">
            <label class="setting-label">Long Break interval</label>
            <input type="number" id="longBreakInterval" class="interval-input" min="1" max="10" value="4" />
          </div>
        </section>

        <!-- Task Section -->
        <section class="settings-section">
          <h3 class="section-title"><span class="section-icon">☑️</span> TASK</h3>

          <div class="setting-row">
            <label class="setting-label">
              Auto Check Tasks
              <span class="info-icon" title="Automatically check off tasks when timer completes">ℹ️</span>
            </label>
            <label class="toggle-switch">
              <input type="checkbox" id="autoCheckTasks" />
              <span class="toggle-slider"></span>
            </label>
          </div>

          <div class="setting-row">
            <label class="setting-label">
              Check to Bottom
              <span class="info-icon" title="Move checked tasks to the bottom of the list">ℹ️</span>
            </label>
            <label class="toggle-switch">
              <input type="checkbox" id="checkToBottom" checked />
              <span class="toggle-slider"></span>
            </label>
          </div>
        </section>

        <!-- Sound Section -->
        <section class="settings-section">
          <h3 class="section-title"><span class="section-icon">🔊</span> SOUND</h3>

          <div class="setting-row">
            <label class="setting-label">Alarm Sound</label>
            <select id="alarmSound" class="sound-select">
              <option value="kitchen">Kitchen</option>
              <option value="bell">Bell</option>
              <option value="bird">Bird</option>
              <option value="digital">Digital</option>
            </select>
          </div>

          <div class="setting-group">
            <label class="setting-label">Volume</label>
            <div class="volume-control">
              <span class="volume-value" id="volumeValue">50</span>
              <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="50" />
            </div>
          </div>

          <div class="setting-row">
            <label class="setting-label">Repeat</label>
            <input type="number" id="alarmRepeat" class="interval-input" min="1" max="10" value="1" />
          </div>
        </section>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-content">
      <a href="https://kromatic.fr" target="_blank" rel="noopener noreferrer" class="footer-logo-link">
        <img src="k-logo.svg" alt="Kromatic" class="footer-logo" />
        <span>kromatic.fr</span>
      </a>
      <div class="footer-links">
        <a href="mentions-legales.html">Mentions légales</a>
        <span class="footer-separator">•</span>
        <a href="politique-confidentialite.html">Politique de confidentialité</a>
      </div>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
